<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport"content="width=device-width, initial-scale=1, user-scalable=no"><title>订单解析Biu~</title><link rel="icon"type="image/svg+xml"href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 10'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230071e3'/%3E%3Cstop offset='1' stop-color='%238A8A8C'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='5' cy='5' r='5' fill='url(%23g)'/%3E%3C/svg%3E"><style>:root{--bg:#f5f5f7;--card:rgba(255,255,255,.72);--text:#1d1d1f;--muted:#6e6e73;--accent:#0071e3;--badge:#ff6b35}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px 14px;max-width:1280px;margin:0 auto;position:relative}body:before{content:"";position:fixed;top:-450px;left:50%;transform:translateX(-50%);width:1200px;height:1200px;border-radius:50%;background:radial-gradient(circle,rgba(0,113,227,.18),transparent 65%);pointer-events:none;z-index:-1}.page{display:none}.page.active{display:block;animation:fadeIn 0.3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.header{margin:0 auto 24px;display:flex;align-items:center;justify-content:space-between;padding:0 8px}.header-left{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;background:linear-gradient(135deg,#0071e3,#63a4ff);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(0,113,227,.3);flex-shrink:0}.header-title h1{font-size:24px;font-weight:600;color:var(--text)}.header-title p{font-size:14px;color:var(--muted);margin-top:2px}.card{background:var(--card);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:30px;padding:24px;margin-bottom:20px;margin-left:8px;margin-right:8px;transition:0.3s ease;box-shadow:0 10px 30px rgba(0,0,0,.04)}.card:hover{transform:translateY(-4px);box-shadow:0 14px 35px rgba(0,0,0,.06)}.card-header{padding:0 0 14px;border-bottom:1px solid rgba(0,0,0,.05);display:flex;align-items:center;justify-content:space-between}.card-title{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--text)}.card-body{padding:20px 0 0}.input-area{width:100%;min-height:400px;max-height:600px;padding:18px;font-size:15px;font-family:inherit;line-height:1.7;color:var(--text);background:rgba(255,255,255,.5);border:1.5px solid rgba(0,0,0,.08);border-radius:18px;resize:vertical;transition:all.3s;outline:none}.input-area:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,113,227,.1);background:#fff}.btn{display:inline-flex;align-items:center;gap:7px;padding:14px 26px;font-size:15px;font-weight:600;border:none;border-radius:16px;cursor:pointer;transition:all 0.3s ease;width:100%;justify-content:center}.btn-primary{background:linear-gradient(135deg,#0071e3,#0077ed);color:#fff;box-shadow:0 6px 20px rgba(0,113,227,.25);max-width:320px;margin:0 auto}.btn-primary:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,113,227,.35)}.btn-primary:active{transform:scale(0.98)}.btn-ghost{background:rgba(0,0,0,.04);color:var(--muted);padding:9px 16px;font-size:13px;width:auto}.btn-ghost:hover{background:rgba(0,113,227,.1);color:var(--accent)}.btn-back{padding:9px 16px;font-size:13px;background:rgba(0,0,0,.04);border:none;border-radius:12px;color:var(--muted);cursor:pointer;transition:all 0.3s ease}.btn-back:hover{background:rgba(0,113,227,.1);color:var(--accent)}.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;max-width:800px;margin-left:auto;margin-right:auto}.stat-card{background:rgba(255,255,255,.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.6);border-radius:20px;padding:20px 12px;text-align:center;transition:all 0.3s ease}.stat-card:hover{transform:translateY(-4px);background:#fff}.stat-label{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}.stat-value{font-size:32px;font-weight:700;line-height:1.2}.stat-value.primary{color:#0071e3}.stat-value.success{color:#34c759}.stat-value.accent{color:#ff6b35}.table-scroll{overflow-x:auto;border-radius:20px;border:1px solid rgba(0,0,0,.06)}table{width:100%;border-collapse:collapse;font-size:15px;min-width:600px}thead th{background:rgba(0,113,227,.08);color:#0071e3;font-weight:600;font-size:13px;padding:16px;text-align:left;border-bottom:1px solid rgba(0,0,0,.06);white-space:nowrap}tbody tr{border-bottom:1px solid rgba(0,0,0,.05);transition:background.2s}tbody tr.need-tag{color:#ff6b35;background-color:rgba(255,107,53,.04)}tbody tr:hover{background:rgba(0,113,227,.05)}td{padding:16px;vertical-align:middle}.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3}.empty-state p{font-size:15px;line-height:1.6}.summary-bar{margin-top:24px;padding:16px 20px;background:rgba(0,113,227,.08);border-radius:16px;font-size:14px;color:#0071e3;display:flex;align-items:center;gap:10px;max-width:800px;margin-left:auto;margin-right:auto;border:1px solid rgba(0,113,227,.12)}.dot{width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0}.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%)translateY(20px);opacity:0;background:rgba(0,0,0,.75);color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;transition:all 0.3s ease;z-index:9999;white-space:nowrap}.toast.show{transform:translateX(-50%)translateY(0);opacity:1}.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:0 8px}@media(max-width:768px){.header-title h1{font-size:20px}.card{border-radius:24px;padding:20px}.input-area{min-height:350px;border-radius:16px}.stats-row{grid-template-columns:repeat(3,1fr);gap:10px}.stat-value{font-size:26px}.btn-primary{max-width:100%}}</style></head><body><!--输入页面--><div id="inputPage"class="page active"><div class="header"><div class="header-left"><div class="logo">📋</div><div class="header-title"><h1>订单解析Biu~</h1><p>一键提取订单商品、数量、重量</p></div></div></div><div class="card"><div class="card-header"><div class="card-title">📝粘贴订单文本</div><button class="btn btn-ghost"onclick="clearInput()">清空</button></div><div class="card-body"><textarea class="input-area"id="inputText"placeholder="将客户发来的所有订单内容粘贴到这里…

示例格式：
鸡蛋:5桶/6.5公斤，打印
番茄:3箱/5桶/8.2公斤
苹果:10桶/12.3公斤"></textarea><div style="margin-top:24px;"><button class="btn btn-primary"onclick="parse()">🚀开始解析</button></div></div></div></div><!--结果页面--><div id="resultPage"class="page"><div class="toolbar"><button class="btn-back"onclick="goBack()">←返回</button></div><div class="card"><div class="card-header"><div class="card-title">📊解析统计</div></div><div class="card-body"><div class="stats-row"id="statsRow"><div class="stat-card"><div class="stat-label">总件数</div><div class="stat-value primary"id="statTotal">0</div></div><div class="stat-card"><div class="stat-label">中桶</div><div class="stat-value success"id="statZhong">0</div></div><div class="stat-card"><div class="stat-label">大桶</div><div class="stat-value accent"id="statDa">0</div></div></div><div class="summary-bar"id="summaryBar"><span class="dot"></span><span id="summaryText"></span></div></div></div><div class="card"><div class="card-header"><div class="card-title">📦订单明细</div></div><div class="card-body"><div id="resultArea"><div class="empty-state"><div class="empty-icon">📊</div><p>解析完成，数据将展示在这里</p></div></div></div></div></div><div class="toast"id="toast"></div><script>function showInputPage(){document.getElementById('inputPage').classList.add('active');document.getElementById('resultPage').classList.remove('active')}function showResultPage(){document.getElementById('inputPage').classList.remove('active');document.getElementById('resultPage').classList.add('active')}function goBack(){showInputPage()}function showToast(msg){const t=document.getElementById('toast');if(t.timer)clearTimeout(t.timer);t.textContent=msg;t.classList.add('show');t.timer=setTimeout(()=>{t.classList.remove('show')},3000)}function clearInput(){document.getElementById('inputText').value='';showToast('已清空输入内容')}function resetResults(){document.getElementById('resultArea').innerHTML=`<div class="empty-state"><div class="empty-icon">📊</div><p>解析完成，数据将展示在这里</p></div>`}function parse(){const raw=document.getElementById('inputText').value;if(!raw.trim()){showToast('请粘贴订单内容后再解析');return}resetResults();showResultPage();const lines=raw.split(/\n+/).map(l=>l.trim()).filter(l=>l.length>3);const tbody=[];let index=1;let totalItems=0,zhongtong=0,datong=0,xiangzi=0;const reg1=/^(.+?):(\d+)(桶|箱)\/.*?(\d+(?:\.\d+)?)公斤/;const reg2=/^(.+?):(\d+)箱\/\d+桶\/(\d+(?:\.\d+)?)公斤/;lines.forEach(line=>{let category,quantity,weight,remark,weightNum=0,qtyNum=0;let needTag=false;if(reg2.test(line)){const m=line.match(reg2);category=m[1].trim();quantity=m[2]+'箱';weight=m[3]+'kg';weightNum=parseFloat(m[3]);qtyNum=parseInt(m[2]);remark=line.replace(reg2,'').replace(/^[,，、；；：：\s]+/,'').trim();needTag=true}else if(reg1.test(line)){const m=line.match(reg1);category=m[1].trim();quantity=m[2]+m[3];weight=m[4]+'kg';weightNum=parseFloat(m[4]);qtyNum=parseInt(m[2]);remark=line.replace(reg1,'').replace(/^[,，、；；：：\s]+/,'').trim();needTag=remark.includes('打印')||quantity.includes('箱')}else return;const rowClass=needTag?'need-tag':'';totalItems+=qtyNum;if(weightNum<10)xiangzi+=qtyNum;else if(weightNum<=20)zhongtong+=qtyNum;else if(weightNum<=200)datong+=qtyNum;tbody.push(`<tr class="${rowClass}"><td>${index++}</td><td>${category}</td><td>${quantity}</td><td>${weight}</td><td>${remark||'—'}</td></tr>`)});if(index===1){showToast('未识别到有效订单数据');goBack();return}document.getElementById('resultArea').innerHTML=`<div class="table-scroll"><table><thead><tr><th>#</th><th>类目</th><th>数量</th><th>重量</th><th>备注</th></tr></thead><tbody>${tbody.join('')}</tbody></table></div>`;document.getElementById('statTotal').textContent=totalItems;document.getElementById('statZhong').textContent=zhongtong;document.getElementById('statDa').textContent=datong;const summary=[`总件数${totalItems}件`];if(xiangzi)summary.push(`箱子${xiangzi}件`);if(zhongtong)summary.push(`中桶${zhongtong}桶`);if(datong)summary.push(`大桶${datong}桶`);document.getElementById('summaryText').textContent=summary.join('　·　');showToast(`解析成功·共识别到${totalItems}件商品`)}document.getElementById('inputText').addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter')parse()});</script><script>var _hmt=_hmt||[];(function(){var hm=document.createElement("script");hm.src="https://hm.baidu.com/hm.js?757929a3feb95c93fd7fb29b23896390";var s=document.getElementsByTagName("script")[0];s.parentNode.insertBefore(hm,s)})();</script></body></html>
