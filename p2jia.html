<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>工具已停用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 16px;
            overflow-x: hidden;
        }

        .page {
            max-width: 540px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            padding: 24px;
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
        }

        .page.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            text-align: center;
            color: #2d3748;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            position: relative;
        }

        h1::after {
            content: "";
            display: block;
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            margin: 8px auto 0;
            border-radius: 3px;
        }

        /* 生成页样式 */
        #generatePage .form-group {
            margin-bottom: 16px;
        }

        #generatePage label {
            display: block;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        #generatePage input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            color: #2d3748;
            background: #f8fafc;
            transition: border 0.3s ease;
            pointer-events: none; /* 禁止输入 */
            opacity: 0.6;
        }

        .generate-btn {
            width: 100%;
            background: #ccc !important;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 8px;
            cursor: not-allowed;
            pointer-events: none;
            opacity: 0.6;
        }

        /* 进度条样式 */
        .progress-container {
            width: 100%;
            height: 20px;
            background: #f1f5f9;
            border-radius: 10px;
            margin: 16px 0;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
            display: none;
        }

        /* 复制页样式 */
        #copyPage .current-review {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0.6;
        }

        #copyPage .current-review-text {
            font-size: 16px;
            color: #2d3748;
            line-height: 1.6;
        }

        #copyPage .count-tip {
            text-align: center;
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .big-copy-btn {
            width: 100%;
            height: 220px;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 30px;
            font-weight: 700;
            cursor: not-allowed;
            pointer-events: none;
            background: #ccc !important;
            opacity: 0.6;
        }

        .back-btn {
            width: 100%;
            background: #f8fafc;
            color: #4a5568;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 500;
            cursor: not-allowed;
            pointer-events: none;
            opacity: 0.6;
        }

        /* 全局停用弹窗 */
        .stop-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }
        .modal-box {
            background: #fff;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            color: #f5576c;
            margin-bottom: 20px;
        }
        .modal-desc {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .modal-btn {
            padding: 14px 30px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 适配小屏 */
        @media (max-width: 375px) {
            .big-copy-btn {
                height: 180px;
                font-size: 26px;
            }
            #copyPage .current-review {
                padding: 16px;
            }
            .page {
                padding: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- 全局停用弹窗 -->
    <div class="stop-modal" id="stopModal">
        <div class="modal-box">
            <div class="modal-title">⚠️ 工具已停用</div>
            <div class="modal-desc">当前版本无法使用<br><br>请前往群内获取最新链接</div>
            <button class="modal-btn" onclick="closeModal()">我知道了</button>
        </div>
    </div>

    <!-- 第一步：生成页 -->
    <div class="page active" id="generatePage">
        <h1>生成购物评价</h1>
        
        <div class="form-group">
            <label for="keywords">评价关键词（例：手机 续航好 拍照清晰）</label>
            <input type="text" id="keywords" placeholder="输入评价核心关键词，多个用空格分隔">
        </div>
        
        <div class="form-group">
            <label for="reviewCount">生成评价条数</label>
            <input type="number" id="reviewCount" value="10" min="1" max="200" placeholder="请输入要生成的条数">
        </div>
        
        <div class="progress-text" id="progressText">生成进度：0/0 (0%)</div>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <button class="generate-btn" id="generateBtn">生成评价 → 进入复制页</button>
    </div>

    <!-- 第二步：复制页 -->
    <div class="page" id="copyPage">
        <h1>复制评价</h1>
        <div class="current-review" id="currentReview">
            <span class="current-review-text" id="currentReviewText">暂无评价，请先生成</span>
        </div>
        <div class="count-tip" id="countTip">剩余评价：0</div>
        <button class="big-copy-btn disabled" id="bigCopyBtn">点击复制</button>
        <button class="back-btn" id="backBtn">← 返回重新生成</button>
    </div>

    <script>
        // 弹窗关闭
        function closeModal(){
            document.getElementById('stopModal').style.display = 'none';
        }

        // 页面加载直接锁定所有功能
        window.onload = function(){
            // 禁用所有交互
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('bigCopyBtn').disabled = true;
            document.getElementById('backBtn').disabled = true;
            document.getElementById('keywords').disabled = true;
            document.getElementById('reviewCount').disabled = true;
        }
    </script>

</script>
</body>
</html>
