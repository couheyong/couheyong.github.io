<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/svg+xml"
		href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 10'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230071e3'/%3E%3Cstop offset='1' stop-color='%238A8A8C'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='5' cy='5' r='5' fill='url(%23g)'/%3E%3C/svg%3E" />
	<title>默Biu~</title>
	<style>
		a{color:red}:root{--bg:#f5f5f7;--card:rgba(255,255,255,.72);--text:#1d1d1f;--muted:#6e6e73;--accent:#0071e3}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}body:before{content:"";position:fixed;top:-450px;left:50%;transform:translateX(-50%);width:1200px;height:1200px;border-radius:50%;background:radial-gradient(circle,rgba(0,113,227,.18),transparent 65%);pointer-events:none}.container{max-width:1280px;margin:auto;padding:40px 24px 80px}.hero{text-align:center;padding:40px 0 20px}.kicker{margin-top:18px;color:var(--accent);font-size:12px;font-weight:700;letter-spacing:.25em}h1{font-size:clamp(42px,8vw,82px);margin:10px 0}.sub{color:var(--muted);max-width:700px;margin:auto;line-height:1.8}.notice{max-width:900px;margin:40px auto;padding:30px;border-radius:32px;background:rgba(255,255,255,.65);backdrop-filter:blur(24px);box-shadow:0 10px 40px rgba(0,0,0,.05);border:1px solid rgba(255,255,255,.7)}.notice h3{margin-bottom:12px}.notice p{line-height:1.9;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px}.card{background:var(--card);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-radius:30px;padding:24px;text-decoration:none;color:inherit;min-height:200px;display:flex;flex-direction:column;transition:.3s;box-shadow:0 10px 30px rgba(0,0,0,.04)}.card:hover{transform:translateY(-8px)}.card h3{margin:0 0 10px;font-size:22px}.card p{color:var(--muted);line-height:1.7;flex:1}.bottom{display:flex;justify-content:space-between;align-items:center;margin-top:18px}.badge{background:#ff6b35;color:#fff;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700}.arrow{font-size:22px;color:var(--accent)}footer{text-align:center;margin-top:70px;color:var(--muted)}@media(max-width:768px){.grid{grid-template-columns:1fr}.notice{padding:22px}}
	</style>
</head>
<body>
	<div class="container">
		<section class="hero">
			<div class="kicker">MOMOMOBIUBIUBIU~~~</div>
			<h1>默Biu~</h1>
			<div class="sub">简单 · 高效 · 本地 · 所有页面均由人工只能辅助生成</div>
		</section>
		<section class="notice">
			<h3>📢 公告</h3>
			<p id="notice"></p>
		</section>
		<section class="grid" id="tools"></section>
		<footer> © 2026 默Biu~ · All Rights Reserved </footer>
	</div>
	<script>
		const notice=`全站所有页面全靠 AI 胡乱搓出来的，东拼西凑全是随缘产物，能用全凭运气，崩了别找我，我自己都看不懂代码。`;
		
		const config=`
		sybiu|赋能水印|纯净高效的时间水印工具|new
		pjdp|评价|本地提取与去重处理
		wuziqi|五子棋|一个冷血的五子棋|new
		pinhe|拼合图片|快速拼接多张图片
		s2ningid|商品ID提取|提取商品数字ID
		ddjxbiu|订单解析Biu~|订单清洗与拆分
		`;
		
		document.getElementById("notice").innerHTML=notice.trim().replace(/\n/g,"<br>");
		
		const data=config.trim().split(/\r?\n/).filter(Boolean).map(line=>{
		const [file,title,desc,flag]=line.split('|');
		return {file,title,desc,isNew:flag==='new'};
		});
		
		document.getElementById("tools").innerHTML=data.map(t=>`
		<a class="card" href="${t.file}/">
		<h3>${t.title}</h3>
		<p>${t.desc}</p>
		<div class="bottom">
		${t.isNew?'<span class="badge">NEW</span>':'<span></span>'}
		<span class="arrow">→</span>
		</div>
		</a>`).join('');
	</script>
	<script>var _hmt=_hmt||[];(function(){var hm=document.createElement("script");hm.src="https://hm.baidu.com/hm.js?757929a3feb95c93fd7fb29b23896390";var s=document.getElementsByTagName("script")[0];s.parentNode.insertBefore(hm,s)})();</script>
</body>
</html>
