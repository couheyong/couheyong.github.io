<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 HTML 网页</title>
    <style>
        /* 简单页面样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #555;
            margin: 15px 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 10px;
        }

        .btn:hover {
            background: #2980b9;
        }

        ul {
            margin: 20px;
            padding-left: 20px;
        }

        img {
            max-width: 100%;
            border-radius: 6px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>这是一个测试 HTML 网页</h1>
        
        <p>这个页面包含了常用的 HTML 元素，用于测试浏览器显示、代码运行、布局效果等。</p>
        
        <!-- 测试图片 -->
        <img src="https://picsum.photos/800/400" alt="测试图片">
        
        <h2>页面功能列表</h2>
        <ul>
            <li>基础 HTML 结构</li>
            <li>CSS 样式美化</li>
            <li>响应式布局</li>
            <li>图片展示</li>
            <li>按钮交互</li>
            <li>文字与列表</li>
        </ul>

        <p>如果你需要修改内容，可以直接编辑这个文件。</p>
        
        <!-- 测试按钮 -->
        <a href="#" class="btn">点击测试按钮</a>
    </div>
</body>
</html>
