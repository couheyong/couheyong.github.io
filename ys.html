<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>量子生物波 · 全息检测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0ede8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', system-ui, -apple-system, sans-serif;
            padding: 16px;
        }

        .phone-frame {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px 48px 40px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.03);
            padding: 24px 20px 28px;
            min-height: 720px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 14px;
            border-bottom: 1px solid #f0ece8;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .status-bar .title {
            font-size: 20px;
            font-weight: 300;
            color: #3d352e;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-bar .title small {
            font-size: 11px;
            color: #b0a69c;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .status-bar .time {
            font-size: 14px;
            color: #b0a69c;
            font-weight: 300;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 4px 0 6px;
            position: relative;
        }

        /* ===== 提示框 ===== */
        .hint-box {
            background: #f8f6f4;
            border-radius: 20px;
            padding: 18px 20px 16px;
            margin-bottom: 12px;
            border: 1px solid #ede8e2;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }
        .hint-box .hint-title {
            font-size: 17px;
            font-weight: 400;
            color: #3d352e;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hint-box .hint-title .icon {
            font-size: 20px;
        }
        .hint-box .hint-sub {
            font-size: 14px;
            color: #8f8173;
            font-weight: 300;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        .hint-box .hint-status {
            font-size: 15px;
            color: #6a5f52;
            font-weight: 300;
            margin-top: 6px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 28px;
        }
        .hint-box .hint-status .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #e0d8d0;
            border-radius: 50%;
            border-top-color: #8f8173;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hint-box.state-waiting { border-color: #ede8e2; }
        .hint-box.state-pressing { border-color: #d5c8bc; background: #faf8f6; }
        .hint-box.state-too-short { border-color: #e8d4c8; background: #fdf8f5; }
        .hint-box.state-processing { border-color: #d5c8bc; background: #faf8f6; }
        .hint-box.state-done { border-color: #d0d8d0; background: #f6f8f5; }

        /* ===== 指纹区域 ===== */
        .fingerprint-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 6px 0 10px;
            min-height: 160px;
            position: relative;
        }

        .fingerprint-ring {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fingerprint-btn {
            width: 130px;
            height: 130px;
            background: radial-gradient(circle at 40% 35%, #f8f5f2, #ede8e2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.04), inset 0 -2px 8px rgba(0,0,0,0.02), inset 0 2px 12px rgba(255,255,255,0.8);
            border: 1px solid rgba(0,0,0,0.04);
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        .fingerprint-btn:active {
            transform: scale(0.96);
        }
        .fingerprint-btn svg {
            width: 60px;
            height: 60px;
            fill: #8f8173;
            transition: fill 0.3s;
        }

        .pressing .fingerprint-btn {
            box-shadow: 0 4px 16px rgba(0,0,0,0.06), inset 0 -2px 8px rgba(0,0,0,0.02), inset 0 2px 20px rgba(180, 160, 140, 0.08);
            border-color: rgba(0,0,0,0.06);
        }
        .pressing .fingerprint-btn svg {
            fill: #a8907a;
        }

        /* ===== 悬浮进度条 ===== */
        .progress-wrapper {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 75%;
            max-width: 240px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
            padding: 10px 16px 12px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.02);
            z-index: 10;
        }
        .progress-wrapper.show {
            display: flex;
        }
        .progress-track {
            width: 100%;
            height: 4px;
            background: #eee8e2;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #b8a89a;
            border-radius: 4px;
            transition: width 0.08s linear;
        }
        .progress-label {
            font-size: 13px;
            color: #b0a69c;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* ===== 结果页面 ===== */
        .result-page {
            display: none;
            flex-direction: column;
            width: 100%;
            padding: 4px 0 8px;
            animation: fadeIn 0.4s ease;
            flex: 1;
        }
        .result-page.show {
            display: flex;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .result-page .result-title {
            font-size: 18px;
            font-weight: 400;
            color: #3d352e;
            letter-spacing: 1px;
            text-align: center;
            border-bottom: 1px solid #f0ece8;
            padding-bottom: 14px;
            margin-bottom: 14px;
        }
        .result-page .result-title span {
            color: #b0a69c;
            font-size: 12px;
            font-weight: 300;
        }
        .result-page .result-user {
            font-size: 13px;
            color: #8f8173;
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        .result-page .result-count {
            font-size: 13px;
            color: #8f8173;
            text-align: center;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            background: #f5f1ec;
            padding: 4px 16px;
            border-radius: 40px;
            display: inline-block;
            align-self: center;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 7px 0 7px 16px;
            border-left: 2px solid #ede8e2;
            margin-bottom: 3px;
            background: #faf8f6;
            border-radius: 0 14px 14px 0;
            padding-right: 6px;
        }
        .result-item .label {
            color: #8f8173;
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 0.3px;
        }
        .result-item .value {
            color: #3d352e;
            font-weight: 300;
            font-size: 14px;
            text-align: right;
            max-width: 60%;
        }

        .result-divider {
            height: 1px;
            background: #f0ece8;
            margin: 12px 0;
        }

        .result-footnote {
            font-size: 13px;
            color: #b0a69c;
            background: #faf8f6;
            padding: 10px 18px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid #f0ece8;
            margin-top: 4px;
            line-height: 1.6;
        }
        .result-footnote strong {
            color: #6a5f52;
            font-weight: 400;
        }
        .result-footnote .improve {
            color: #5a8a6a;
            font-weight: 400;
        }
        .result-footnote .decline {
            color: #b07a6a;
            font-weight: 400;
        }

        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .action-row .btn {
            flex: 1;
            padding: 12px 6px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 300;
            background: #f5f1ec;
            color: #8f8173;
            cursor: pointer;
            transition: all 0.12s;
            letter-spacing: 1.5px;
            font-family: inherit;
            border: 1px solid #f0ece8;
        }
        .action-row .btn:active {
            transform: scale(0.96);
            background: #ede8e2;
        }
        .action-row .btn-primary {
            background: #ede8e2;
            color: #5a4f46;
        }

        .footnote {
            margin-top: 18px;
            font-size: 11px;
            color: #ccc4bc;
            text-align: center;
            letter-spacing: 0.5px;
            border-top: 1px solid #f0ece8;
            padding-top: 14px;
            flex-shrink: 0;
        }
        .footnote i {
            font-style: normal;
            background: #faf8f6;
            padding: 2px 16px;
            border-radius: 40px;
            color: #ccc4bc;
        }

        .initial-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .initial-content.hidden {
            display: none;
        }

        /* ===== 弹窗样式 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #ffffff;
            border-radius: 32px;
            padding: 32px 28px 28px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            animation: modalIn 0.35s ease;
        }
        @keyframes modalIn {
            0% { opacity: 0; transform: scale(0.92) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-box .modal-title {
            font-size: 20px;
            font-weight: 400;
            color: #3d352e;
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .modal-box .modal-sub {
            font-size: 14px;
            color: #b0a69c;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }
        .modal-box .modal-row {
            margin-bottom: 12px;
        }
        .modal-box .modal-row label {
            display: block;
            font-size: 13px;
            color: #8f8173;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            font-weight: 300;
        }
        .modal-box .modal-row input,
        .modal-box .modal-row select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0d8d0;
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            background: #faf8f6;
            color: #3d352e;
            outline: none;
            transition: border-color 0.15s;
        }
        .modal-box .modal-row input:focus,
        .modal-box .modal-row select:focus {
            border-color: #b8a89a;
            background: #ffffff;
        }
        .modal-box .modal-row .hint {
            font-size: 12px;
            color: #b0a69c;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }
        .modal-box .modal-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 400;
            background: #d5c8bc;
            color: #3d352e;
            cursor: pointer;
            transition: all 0.12s;
            letter-spacing: 1.5px;
            font-family: inherit;
            margin-top: 6px;
        }
        .modal-box .modal-btn:active {
            transform: scale(0.96);
            background: #c8b8aa;
        }

        @media (max-width: 420px) {
            .phone-frame { padding: 16px 14px 20px; min-height: 620px; }
            .fingerprint-ring { width: 130px; height: 130px; }
            .fingerprint-btn { width: 112px; height: 112px; }
            .fingerprint-btn svg { width: 50px; height: 50px; }
            .hint-box { padding: 14px 16px; min-height: 76px; }
            .hint-box .hint-title { font-size: 15px; }
            .modal-box { padding: 24px 20px 20px; }
        }
    </style>
</head>
<body>

<!-- ===== 弹窗 ===== -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-title">🧬 个人信息</div>
        <div class="modal-sub">请输入基本信息以开始检测</div>
        <div class="modal-row">
            <label>姓名</label>
            <input type="text" id="modalName" placeholder="请输入姓名" value="张先生">
        </div>
        <div class="modal-row">
            <label>性别</label>
            <select id="modalGender">
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <div class="modal-row">
            <label>年龄</label>
            <input type="number" id="modalAge" placeholder="请输入年龄" value="42" min="18" max="99">
        </div>
        <div class="modal-row">
            <label>本次检测次数</label>
            <input type="number" id="modalCount" placeholder="请输入第几次检测" value="1" min="1" max="99">
            <div class="hint">💡 首次检测输入 1，后续检测依次递增</div>
        </div>
        <button class="modal-btn" id="modalConfirmBtn">✓ 确认 · 开始检测</button>
    </div>
</div>

<!-- ===== 主界面 ===== -->
<div class="phone-frame" id="phoneFrame">
    <div class="status-bar">
        <div class="title">🧬 量子波 <small>· 全息</small></div>
        <div class="time" id="clockDisplay">--:--</div>
    </div>

    <div class="content">
        <!-- 初始内容 -->
        <div class="initial-content" id="initialContent">
            <!-- 提示框 -->
            <div class="hint-box state-waiting" id="hintBox">
                <div class="hint-title">
                    <span class="icon">🔮</span> 指纹识别
                </div>
                <div class="hint-sub" id="hintSub">请将手指置于下方指纹传感器上</div>
                <div class="hint-status" id="hintStatus">
                    <span>👆 等待检测</span>
                </div>
            </div>

            <!-- 指纹区域 -->
            <div class="fingerprint-area">
                <div class="fingerprint-ring">
                    <div class="fingerprint-btn" id="fingerBtn" role="button" tabindex="0">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17.1 8.3c.9.9 1.4 2.1 1.4 3.4 0 .6-.1 1.1-.3 1.6l1.5 1.5c.5-1 .8-2.1.8-3.1 0-2.2-.9-4.2-2.4-5.7l-1.4 1.4c.2.2.4.5.4.9zM12 4.9c.8 0 1.6.2 2.3.5l1.4-1.4C14.5 3.2 13.3 2.8 12 2.8S9.5 3.2 8.3 4L9.7 5.4c.7-.3 1.5-.5 2.3-.5zM8.3 6.7L6.9 5.3c-1.5 1.5-2.4 3.5-2.4 5.7 0 2.2.9 4.2 2.4 5.7L8.3 15.3c-.9-.9-1.4-2.1-1.4-3.4 0-1.3.5-2.5 1.4-3.4zm7.4 8.6l-1.5 1.5c-.8.4-1.7.7-2.6.7-2.8 0-5-2.2-5-5 0-1.2.4-2.3 1.1-3.2l-1.5-1.5C5.4 9.6 4.8 11 4.8 12.5c0 3.3 2.7 6 6 6 1.5 0 2.9-.6 4-1.5l1.5-1.5-1.4-1.4c-.5.5-1.2.8-2 .8-1.4 0-2.5-1.1-2.5-2.5 0-.9.5-1.7 1.2-2.2L11.5 9c-.4.4-.7 1-.7 1.5 0 .8.7 1.5 1.5 1.5.8 0 1.5-.7 1.5-1.5 0-.6-.3-1.1-.8-1.4l-1.5-1.5c-.7.4-1.2 1.2-1.2 2 0 1.4 1.1 2.5 2.5 2.5s2.5-1.1 2.5-2.5c0-1.4-1.1-2.5-2.5-2.5-.3 0-.6.1-.8.2l1.5 1.5c.8-.8.8-2.1 0-2.9-.8-.8-2.1-.8-2.9 0L8.3 8.3c-.9.9-1.4 2.1-1.4 3.4 0 1.3.5 2.5 1.4 3.4l1.4-1.4c-.2-.2-.3-.5-.3-.8 0-.8.7-1.5 1.5-1.5.8 0 1.5.7 1.5 1.5 0 .6-.3 1.1-.8 1.4l1.5 1.5c.4-.4.7-1 .7-1.5 0-.8-.7-1.5-1.5-1.5s-1.5.7-1.5 1.5c0 .8.7 1.5 1.5 1.5.3 0 .6-.1.8-.2z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- 悬浮进度条 -->
        <div class="progress-wrapper" id="progressWrapper">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-label" id="progressLabel">0%</div>
        </div>

        <!-- 结果页面 -->
        <div class="result-page" id="resultPage">
            <div class="result-title">📊 生物场全息分析 <span id="resultTime"></span></div>
            <div class="result-user" id="resultUser"></div>
            <div class="result-count" id="resultCount"></div>
            <div id="resultItems"></div>
            <div class="result-divider"></div>
            <div class="result-footnote" id="resultFootnote">💡 建议：调节作息，适当运动</div>
            <div class="action-row">
                <button class="btn btn-primary" id="resetBtn">⟳ 重新检测</button>
            </div>
        </div>
    </div>

    <div class="footnote">
        <i>⚠️ 基于指纹识别 · YS演绎</i>
    </div>
</div>

<script>
    (function() {
        // DOM
        const fingerBtn = document.getElementById('fingerBtn');
        const hintBox = document.getElementById('hintBox');
        const hintStatus = document.getElementById('hintStatus');
        const hintSub = document.getElementById('hintSub');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressFill = document.getElementById('progressFill');
        const progressLabel = document.getElementById('progressLabel');
        const initialContent = document.getElementById('initialContent');
        const resultPage = document.getElementById('resultPage');
        const resultItems = document.getElementById('resultItems');
        const resultFootnote = document.getElementById('resultFootnote');
        const resultTime = document.getElementById('resultTime');
        const resultUser = document.getElementById('resultUser');
        const resultCount = document.getElementById('resultCount');
        const resetBtn = document.getElementById('resetBtn');
        const clockDisplay = document.getElementById('clockDisplay');
        const phoneFrame = document.getElementById('phoneFrame');

        // 弹窗
        const modalOverlay = document.getElementById('modalOverlay');
        const modalName = document.getElementById('modalName');
        const modalGender = document.getElementById('modalGender');
        const modalAge = document.getElementById('modalAge');
        const modalCount = document.getElementById('modalCount');
        const modalConfirmBtn = document.getElementById('modalConfirmBtn');

        let userInfo = { name: '张先生', gender: '男', age: 42, count: 1 };
        let isUserConfirmed = false;
        let previousResult = null;

        // 状态
        let pressTimer = null;
        let progressTimer = null;
        let isPressing = false;
        let isProcessing = false;
        let pressStartTime = 0;
        let progress = 0;
        const REQUIRED_HOLD = 5000;

        // 时钟
        function updateClock() {
            const now = new Date();
            clockDisplay.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        updateClock();
        setInterval(updateClock, 30000);

        // 提示框状态管理
        function setHintState(state, title, sub, statusHtml) {
            hintBox.className = 'hint-box ' + state;
            const titleEl = hintBox.querySelector('.hint-title');
            const subEl = hintBox.querySelector('.hint-sub');
            const icon = titleEl.querySelector('.icon');
            titleEl.innerHTML = '';
            if (icon) titleEl.appendChild(icon);
            titleEl.appendChild(document.createTextNode(' ' + title));
            subEl.textContent = sub;
            hintStatus.innerHTML = statusHtml;
        }

        function resetHint() {
            const name = userInfo.name || '';
            setHintState('state-waiting', '指纹识别',
                name ? `请将手指置于下方指纹传感器上 · ${name}` : '请将手指置于下方指纹传感器上',
                '<span>👆 等待检测</span>'
            );
        }

        // ===== 基于年龄+性别+检测次数的唬人数据 =====
        function generateReport(user, count, prevResult) {
            const { name, gender, age } = user;
            const isMale = gender === '男';
            const ageGroup = age < 35 ? '青年' : (age < 50 ? '中年' : '中老年');

            const baseLabels = [
                '心脑血管', '心率变异性', '脑波节律', '自主神经', '经络能量',
                '细胞活性', '微循环', '血氧饱和度', '代谢速率', '内分泌指数',
                '免疫应答', '自由基水平', '线粒体功能', '褪黑素分泌', '皮质醇节律',
                '生物场能', '阴阳平衡', '五行偏颇', '气血状态', '脏腑协调',
                '量子相干性', '生物光子辐射', '经络谐振频率', '表观遗传活性', '端粒长度评估',
                '血管弹性', '炎症水平', '氧化应激', '神经传导', '淋巴循环'
            ];

            const ageModifiers = {
                '青年': { base: '偏亢', risk: '虚火上炎', improve: '趋于平衡' },
                '中年': { base: '偏虚', risk: '劳损积滞', improve: '逐渐改善' },
                '中老年': { base: '亏耗', risk: '衰退趋势', improve: '延缓衰退' }
            };
            const mod = ageModifiers[ageGroup] || ageModifiers['中年'];
            const genderPrefix = isMale ? '肾' : '肝';

            // 根据检测次数调整数值 — 越往后越好
            const progressFactor = Math.min((count - 1) / 4, 1.0);
            const improveOffset = Math.floor(progressFactor * 30);

            const count_ = 14 + Math.floor(Math.random() * 4);
            const shuffled = [...baseLabels].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, count_);

            const items = selected.map((label, idx) => {
                let val;
                const r = Math.random();
                const baseNum = 35 + Math.floor(Math.random() * 45);
                const adjustedNum = Math.min(baseNum + improveOffset + Math.floor(Math.random() * 12), 96);
                const statusWords = ['临界', '轻度', '中度', '明显'];
                const trendWords = ['偏高', '偏低', '紊乱', '波动'];

                if (r < 0.2) {
                    val = `${mod.base} · ${genderPrefix}${['气','血','精','神'][idx % 4]}不调`;
                } else if (r < 0.4) {
                    val = `${mod.risk} · ${isMale ? '阳' : '阴'}虚${['火旺','湿蕴','郁滞'][idx % 3]}`;
                } else if (r < 0.65) {
                    const s = statusWords[idx % statusWords.length];
                    const t = trendWords[idx % trendWords.length];
                    val = `${s}${t} (${adjustedNum}%)`;
                } else {
                    const improvement = progressFactor > 0.25 ? ' · 较前改善' : '';
                    val = `${['趋于稳定','轻度异常','代偿期','调节中'][idx % 4]} (${adjustedNum}%)${improvement}`;
                }
                return { label, value: val, numValue: adjustedNum };
            });

            // 加入"具体"数据
            const heartRate = 55 + Math.floor(Math.random() * 28) - Math.floor(progressFactor * 10);
            const bpSys = 105 + Math.floor(Math.random() * 28) - Math.floor(progressFactor * 8);
            const bpDia = 65 + Math.floor(Math.random() * 18) - Math.floor(progressFactor * 5);
            const spo2 = 93 + Math.floor(Math.random() * 4) + Math.floor(progressFactor * 4);

            const extras = [
                { label: '心率', value: `${Math.max(52, heartRate)} bpm · ${progressFactor > 0.3 ? '节律较前规整' : '节律不齐'}` },
                { label: '血压趋势', value: `${Math.max(98, bpSys)}/${Math.max(58, bpDia)} · ${progressFactor > 0.3 ? '波动减小' : '波动明显'}` },
                { label: '血氧饱和度', value: `${Math.min(99, spo2)}% · ${progressFactor > 0.4 ? '末梢灌注改善' : '末梢灌注不足'}` },
                { label: 'HRV', value: `${15 + Math.floor(Math.random() * 28) + Math.floor(progressFactor * 12)} ms · ${progressFactor > 0.3 ? '自主神经调节改善' : '自主神经调节减弱'}` },
                { label: '血管弹性', value: `${50 + Math.floor(Math.random() * 28) + Math.floor(progressFactor * 18)}% · ${progressFactor > 0.3 ? '弹性回升' : '弹性下降'}` },
                { label: '炎症水平', value: `${18 + Math.floor(Math.random() * 38) - Math.floor(progressFactor * 22)} AU · ${progressFactor > 0.4 ? '较前下降' : '偏高'}` },
                { label: '氧化应激', value: `${30 + Math.floor(Math.random() * 35) - Math.floor(progressFactor * 18)} · ${progressFactor > 0.3 ? '改善中' : '偏高水平'}` },
                { label: '睡眠质量指数', value: `${55 + Math.floor(Math.random() * 25) + Math.floor(progressFactor * 12)}% · ${progressFactor > 0.3 ? '改善' : '欠佳'}` },
            ];
            const extraCount = 3 + Math.floor(Math.random() * 2);
            for (let i = 0; i < extraCount && i < extras.length; i++) {
                items.push(extras[i]);
            }
            items.sort(() => Math.random() - 0.5);

            // ===== 生成改善对比信息 =====
            let improvementMsg = '';
            const currAvg = items.reduce((sum, it) => sum + (it.numValue || 50), 0) / items.length;

            if (prevResult && count > 1) {
                const prevAvg = prevResult.avgScore || 50;
                const diff = currAvg - prevAvg;
                if (diff > 10) {
                    improvementMsg = `✨ 较第 ${count-1} 次检测，整体状态显著改善 (+${Math.round(diff)}%)，持续向好`;
                } else if (diff > 5) {
                    improvementMsg = `📈 较第 ${count-1} 次检测，整体状态明显改善 (+${Math.round(diff)}%)，调理有效`;
                } else if (diff > 2) {
                    improvementMsg = `📊 较第 ${count-1} 次检测，整体状态有所改善 (+${Math.round(diff)}%)，趋于稳定`;
                } else if (diff > -3) {
                    improvementMsg = `⚖️ 较第 ${count-1} 次检测，整体状态保持稳定，建议继续坚持`;
                } else if (diff > -8) {
                    improvementMsg = `🔄 较第 ${count-1} 次检测，部分指标略有波动，建议加强调理`;
                } else {
                    improvementMsg = `⚠️ 较第 ${count-1} 次检测，部分指标出现下滑，建议及时调整生活方式`;
                }
            } else if (count === 1) {
                improvementMsg = `📋 首次检测，已建立基准数据档案`;
            } else {
                improvementMsg = `📊 第 ${count} 次检测`;
            }

            // ===== 唬人建议 =====
            const supplementMap = {
                '青年': {
                    male: ['辅酶Q10', '锌+硒', '维生素B族', '精氨酸', '玛卡提取物', 'D-核糖', '牛磺酸'],
                    female: ['铁+叶酸', '维生素C', '胶原蛋白肽', '月见草油', '钙+维生素D', '葡萄籽提取物', '透明质酸']
                },
                '中年': {
                    male: ['辅酶Q10', '前列腺素', '锌+镁', '维生素E', '人参皂苷', 'α-硫辛酸', '红景天提取物'],
                    female: ['大豆异黄酮', '钙+维生素D', '维生素B6', '镁+锌', '葡萄籽提取物', '透明质酸', '月见草油']
                },
                '中老年': {
                    male: ['辅酶Q10', '维生素D3', '钙+镁', '鱼油(EPA/DHA)', '银杏提取物', 'NAD+前体', 'PQQ'],
                    female: ['钙+维生素D', '维生素K2', '镁+锌', '鱼油(EPA/DHA)', '辅酶Q10', '胶原蛋白肽', '维生素B12']
                }
            };

            const groupMap = ageGroup;
            const genderMap = isMale ? 'male' : 'female';
            const supps = supplementMap[groupMap]?.[genderMap] || supplementMap['中年']['male'];
            const selectedSupps = supps.slice(0, 4 + Math.floor(Math.random() * 2));

            const advicePrefix = progressFactor > 0.35 ? '持续改善中，建议继续' : '建议重点关注';
            const advicePool = [
                `${advicePrefix} ${genderPrefix}${isMale ? '阳' : '阴'}系统，补充 ${selectedSupps.join('、')}。`,
                `经络能量${progressFactor > 0.35 ? '回升' : '偏低'}，${isMale ? '阳气' : '阴血'}${progressFactor > 0.35 ? '渐充' : '不足'}，建议 ${selectedSupps.join('、')} 配合太极/八段锦。`,
                `代谢速率 ${progressFactor > 0.35 ? '趋于正常' : '偏慢'}，建议 ${selectedSupps.join('、')} 并增加有氧运动。`,
                `${ageGroup}阶段${isMale ? '阳气' : '阴血'}${progressFactor > 0.35 ? '得到补充' : '渐亏'}，建议 ${selectedSupps.join('、')} 配合作息调整。`,
                `自由基水平${progressFactor > 0.35 ? '下降' : '偏高'}，建议补充 ${selectedSupps.join('、')} 并减少熬夜。`,
                `免疫功能${progressFactor > 0.35 ? '增强' : '偏弱'}，建议 ${selectedSupps.join('、')} 并适度晒太阳。`,
                `神经系统${progressFactor > 0.35 ? '趋于稳定' : '紧张'}，建议 ${selectedSupps.join('、')} 配合冥想练习。`,
                `消化吸收功能${progressFactor > 0.35 ? '改善' : '偏弱'}，建议 ${selectedSupps.join('、')} 配合益生菌。`
            ];

            const foot = advicePool[Math.floor(Math.random() * advicePool.length)];

            return {
                items,
                footnote: foot,
                time: new Date().toLocaleString(),
                userDisplay: `${name} · ${gender} · ${age}岁 · ${ageGroup}`,
                count: count,
                improvementMsg: improvementMsg,
                avgScore: currAvg,
                countDisplay: `第 ${count} 次检测`
            };
        }

        function renderResult(report) {
            resultTime.textContent = `🕒 ${report.time}`;
            resultUser.textContent = `👤 ${report.userDisplay}`;
            resultCount.textContent = `📋 ${report.countDisplay}`;

            let itemsHtml = '';
            report.items.forEach((item, idx) => {
                const isImproved = idx % 2 === 0 && report.count > 1 ? ' ✓' : '';
                itemsHtml += `<div class="result-item"><span class="label">${item.label}</span><span class="value">${item.value}${isImproved}</span></div>`;
            });
            resultItems.innerHTML = itemsHtml;

            const improveHtml = report.improvementMsg ? `<br><span class="improve">${report.improvementMsg}</span>` : '';
            resultFootnote.innerHTML = `💡 ${report.footnote}${improveHtml}`;
        }

        function showResult() {
            initialContent.classList.add('hidden');
            resultPage.classList.add('show');
            const count = userInfo.count || 1;
            const report = generateReport(userInfo, count, previousResult);
            renderResult(report);
            previousResult = { avgScore: report.avgScore };
        }

        // ===== 重置并显示弹窗 =====
        function resetAndShowModal() {
            // 清理所有状态
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
            isPressing = false;
            isProcessing = false;
            progress = 0;
            progressFill.style.width = '0%';
            progressLabel.textContent = '0%';
            progressWrapper.classList.remove('show');
            phoneFrame.classList.remove('pressing');
            initialContent.classList.remove('hidden');
            resultPage.classList.remove('show');
            previousResult = null;
            isUserConfirmed = false;

            // 禁用指纹
            fingerBtn.style.pointerEvents = 'none';
            fingerBtn.style.opacity = '0.6';

            // 弹窗回填已有信息
            modalName.value = userInfo.name || '';
            modalGender.value = userInfo.gender || '男';
            modalAge.value = userInfo.age || 30;
            modalCount.value = userInfo.count || 1;

            // 显示弹窗
            modalOverlay.classList.add('show');
            resetHint();
        }

        // ===== 弹窗确认 =====
        function confirmUser() {
            const name = modalName.value.trim() || '未命名';
            const gender = modalGender.value;
            const age = parseInt(modalAge.value) || 30;
            const count = parseInt(modalCount.value) || 1;
            userInfo = { name, gender, age, count: Math.max(1, count) };
            isUserConfirmed = true;
            previousResult = null;

            modalOverlay.classList.remove('show');
            resetHint();
            fingerBtn.style.pointerEvents = 'auto';
            fingerBtn.style.opacity = '1';
        }

        // ===== 指纹交互 =====
        function handlePressStart(e) {
            e.preventDefault();
            if (!isUserConfirmed || isProcessing || isPressing) return;

            isPressing = true;
            pressStartTime = Date.now();
            phoneFrame.classList.add('pressing');

            setHintState('state-pressing', '⏳ 请保持手指',
                '生物场感应中，请勿移开',
                '<span>⏳ 请保持手指 ...</span>'
            );

            progressWrapper.classList.add('show');
            progress = 0;
            progressFill.style.width = '0%';
            progressLabel.textContent = '0%';

            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }

            progressTimer = setInterval(() => {
                const elapsed = Date.now() - pressStartTime;
                progress = Math.min((elapsed / REQUIRED_HOLD) * 100, 100);
                progressFill.style.width = progress + '%';
                progressLabel.textContent = Math.floor(progress) + '%';
            }, 50);

            pressTimer = setTimeout(() => {}, REQUIRED_HOLD);
        }

        function handlePressEnd(e) {
            e.preventDefault();
            if (!isPressing || isProcessing) return;

            const elapsed = Date.now() - pressStartTime;
            if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            phoneFrame.classList.remove('pressing');

            if (elapsed < REQUIRED_HOLD) {
                setHintState('state-too-short', '⏱️ 时间过短',
                    `仅 ${Math.floor(elapsed/1000)} 秒，请长按至少 5 秒`,
                    `<span>⏱️ 时间过短 (${Math.floor(elapsed/1000)}s) · 请长按5秒</span>`
                );
                progressWrapper.classList.remove('show');
                progress = 0;
                progressFill.style.width = '0%';
                progressLabel.textContent = '0%';
                isPressing = false;

                fingerBtn.style.transition = 'transform 0.08s';
                fingerBtn.style.transform = 'scale(0.92)';
                setTimeout(() => { fingerBtn.style.transform = 'scale(1)'; }, 100);

                setTimeout(() => {
                    if (!isPressing && !isProcessing && isUserConfirmed) {
                        resetHint();
                    }
                }, 1800);
                return;
            }

            // 成功
            isPressing = false;
            isProcessing = true;
            const countDisplay = userInfo.count || 1;
            setHintState('state-processing', '🧬 生物场解析',
                `第 ${countDisplay} 次分析中，请稍候 ...`,
                `<span class="spinner"></span> 解析中 ...`
            );

            progressFill.style.width = '100%';
            progressLabel.textContent = '100%';

            setTimeout(() => {
                isProcessing = false;
                progressWrapper.classList.remove('show');
                showResult();
                setHintState('state-done', '✅ 检测完成',
                    `第 ${userInfo.count || 1} 次生物场全息分析已完成`,
                    '<span>✅ 完成</span>'
                );
            }, 800);
        }

        // ===== 事件绑定 =====
        modalConfirmBtn.addEventListener('click', confirmUser);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && modalOverlay.classList.contains('show')) {
                confirmUser();
            }
        });

        fingerBtn.addEventListener('mousedown', handlePressStart);
        fingerBtn.addEventListener('mouseup', handlePressEnd);
        fingerBtn.addEventListener('mouseleave', e => { if (isPressing) handlePressEnd(e); });

        fingerBtn.addEventListener('touchstart', handlePressStart, { passive: false });
        fingerBtn.addEventListener('touchend', handlePressEnd, { passive: false });
        fingerBtn.addEventListener('touchcancel', e => { if (isPressing) handlePressEnd(e); });

        // 重新检测按钮 - 显示弹窗
        resetBtn.addEventListener('click', resetAndShowModal);

        fingerBtn.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handlePressStart(e); }
        });
        fingerBtn.addEventListener('keyup', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handlePressEnd(e); }
        });

        // ===== 初始化 =====
        fingerBtn.style.pointerEvents = 'none';
        fingerBtn.style.opacity = '0.6';
        modalOverlay.classList.add('show');

        modalName.value = '张先生';
        modalGender.value = '男';
        modalAge.value = '42';
        modalCount.value = '1';

        resetHint();
    })();
</script>
</body>
</html>
