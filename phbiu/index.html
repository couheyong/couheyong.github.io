<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><title>拼合Biu~</title><script src="./fabric.min.js"></script><script src="./Sortable.min.js"></script><link rel="icon"type="image/svg+xml"href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 10'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230071e3'/%3E%3Cstop offset='1' stop-color='%238A8A8C'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='5' cy='5' r='5' fill='url(%23g)'/%3E%3C/svg%3E"/><style>:root{--bg:#f5f5f7;--card:rgba(255,255,255,.72);--text:#1d1d1f;--muted:#6e6e73;--accent:#0071e3;--danger:#ff3b30;--border:rgba(0,0,0,.08);--radius:16px;--font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif}*{box-sizing:border-box;-webkit-font-smoothing:antialiased;margin:0;padding:0}body{font-family:var(--font-family);margin:0;display:flex;height:100vh;background:var(--bg);color:var(--text);overflow:hidden;position:relative}body:before{content:"";position:fixed;top:-450px;left:50%;transform:translateX(-50%);width:1200px;height:1200px;border-radius:50%;background:radial-gradient(circle,rgba(0,113,227,.18),transparent 65%);pointer-events:none;z-index:-1}.sidebar{width:25vw;min-width:320px;max-width:400px;background:var(--card);backdrop-filter:blur(20px);display:flex;flex-direction:column;box-shadow:10px 0 30px rgba(0,0,0,0.05);z-index:20;border-right:1px solid rgba(255,255,255,.8)}.sidebar-header{padding:30px 24px;flex-shrink:0}.sidebar-header h2{margin:0;font-size:24px;font-weight:700;color:var(--text)}.sidebar-content{padding:0 24px 24px 24px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:20px}.tab-group{display:flex;background:rgba(0,0,0,.04);padding:5px;border-radius:var(--radius);flex-shrink:0}.tab{flex:1;text-align:center;padding:10px;font-size:14px;font-weight:500;cursor:pointer;border-radius:12px;color:var(--muted);transition:0.3s}.tab.active{background:var(--accent);color:white}#imageList{list-style:none;padding:0;margin:0}.img-card{background:rgba(0,0,0,.02);border-radius:var(--radius);padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:12px;cursor:grab;border:1px solid rgba(0,0,0,.06);transition:0.2s}.img-card:hover{border-color:var(--accent);background:rgba(0,113,227,.04)}.img-card img{width:50px;height:50px;object-fit:cover;border-radius:10px}.input-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;letter-spacing:0.5px}input[type="text"]{background:rgba(0,0,0,.04);border:1px solid var(--border);padding:14px;border-radius:var(--radius);color:var(--text);width:100%;box-sizing:border-box;transition:0.3s;font-size:15px}input[type="text"]:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(0,113,227,.1)}.btn{padding:14px 20px;border:none;border-radius:var(--radius);cursor:pointer;font-weight:600;width:100%;transition:0.3s ease;font-size:15px}.btn-upload{background:rgba(0,0,0,.03);color:var(--text);border:1px dashed rgba(0,0,0,.12)}.btn-upload:hover{border-color:var(--accent);background:rgba(0,113,227,.06)}.btn-save{background:linear-gradient(135deg,#0071e3,#0077ed);color:white;margin-top:10px;margin-bottom:10px;flex-shrink:0;box-shadow:0 6px 20px rgba(0,113,227,.25)}.btn-save:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,113,227,.3)}.mini-btn{background:rgba(0,0,0,.06);color:var(--text);padding:8px 12px;border-radius:10px;border:none;cursor:pointer;font-size:12px;transition:0.2s}.mini-btn.del{background:rgba(255,59,48,.1);color:var(--danger)}.mini-btn:hover{background:var(--accent);color:white}.mini-btn.del:hover{background:var(--danger);color:#fff}.main-workspace{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;position:relative}.canvas-container-outer{transform-origin:center center;box-shadow:0 20px 60px rgba(0,0,0,.15);background:white;transition:transform 0.2s ease-out;border-radius:12px;overflow:hidden}.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}.toast{background:#ff3b30;color:white;padding:12px 24px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.15);font-weight:600;animation:slideIn 0.3s ease-out forwards}@keyframes slideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}</style></head><body><div id="toastContainer"class="toast-container"></div><div class="sidebar"><div class="sidebar-header"><h2>拼合Biu~</h2></div><div class="sidebar-content"><div class="tab-group"><div id="tab-landscape"class="tab active"onclick="switchMode('landscape')">横向模式</div><div id="tab-portrait"class="tab"onclick="switchMode('portrait')">纵向模式</div></div><button class="btn btn-upload"onclick="document.getElementById('f').click()">+上传图像</button><input type="file"id="f"multiple accept="image/*"style="display: none;"><ul id="imageList"></ul><div class="input-group"><label>大标题</label><input type="text"id="t1"placeholder="必填内容"oninput="updateTexts()"></div><div class="input-group"><label>二标题</label><input type="text"id="t2"placeholder="必填内容"oninput="updateTexts()"></div><button class="btn btn-save"onclick="save()">导出图片</button></div></div><div class="main-workspace"><div id="canvasWrapper"class="canvas-container-outer"><canvas id="c"></canvas></div></div><script>let canvas,imgs=[],mode='landscape',isRendering=false;const GAP=2;const DEFAULT_FONT='"Microsoft YaHei", "微软雅黑"';window.onload=()=>{initCanvas();initSortable()};window.onresize=()=>adjustZoom();function showToast(msg){const container=document.getElementById('toastContainer');const toast=document.createElement('div');toast.className='toast';toast.innerText=msg;container.appendChild(toast);setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.remove(),300)},3000)}function initSortable(){Sortable.create(document.getElementById('imageList'),{animation:150,onEnd:function(){const ids=Array.from(document.querySelectorAll('.img-card')).map(li=>li.getAttribute('data-id'));imgs.sort((a,b)=>ids.indexOf(a.id.toString())-ids.indexOf(b.id.toString()));updateUI()}})}function initCanvas(){const w=mode==='landscape'?1024:768,h=mode==='landscape'?768:1024;if(canvas)canvas.dispose();canvas=new fabric.Canvas('c',{width:w,height:h,backgroundColor:'#fff',preserveObjectStacking:true});adjustZoom();render()}function adjustZoom(){const wrapper=document.querySelector('.main-workspace');if(!wrapper||!canvas)return;const scale=Math.min((wrapper.offsetWidth-40)/canvas.width,(wrapper.offsetHeight-40)/canvas.height,1);document.getElementById('canvasWrapper').style.transform=`scale(${scale})`}function switchMode(m){mode=m;document.getElementById('tab-landscape').className=m==='landscape'?'tab active':'tab';document.getElementById('tab-portrait').className=m==='portrait'?'tab active':'tab';initCanvas()}document.getElementById('f').onchange=(e)=>{const files=Array.from(e.target.files);let loaded=0;files.forEach(file=>{const r=new FileReader();r.onload=(f)=>{imgs.push({id:'id_'+Date.now()+Math.random(),src:f.target.result,angle:0});loaded++;if(loaded===files.length)updateUI()};r.readAsDataURL(file)});e.target.value=''};function updateUI(){const list=document.getElementById('imageList');list.innerHTML='';imgs.forEach((img,i)=>{const li=document.createElement('li');li.className='img-card';li.setAttribute('data-id',img.id);li.innerHTML=`<img src="${img.src}"><div style="flex:1;font-size:12px;color:var(--muted)">图层${i+1}</div><button class="mini-btn"onclick="rotateById('${img.id}')">旋</button><button class="mini-btn del"onclick="delById('${img.id}')">×</button>`;list.appendChild(li)});render()}function rotateById(id){const t=imgs.find(x=>x.id===id);if(t){t.angle=(t.angle+90)%360;render()}}function delById(id){imgs=imgs.filter(x=>x.id!==id);updateUI()}function renderImage(data,region){return new Promise(res=>{fabric.Image.fromURL(data.src,img=>{img.set({angle:data.angle});const isRot=data.angle%180!==0;const iW=isRot?img.height:img.width,iH=isRot?img.width:img.height;const sc=Math.max(region.w/iW,region.h/iH);img.set({left:region.x+region.w/2,top:region.y+region.h/2,originX:'center',originY:'center',scaleX:sc,scaleY:sc,selectable:true,clipPath:new fabric.Rect({left:region.x,top:region.y,width:region.w,height:region.h,absolutePositioned:true})});canvas.add(img);img.sendToBack();res()})})}async function updateTexts(){if(!canvas)return;const t1Val=document.getElementById('t1').value||"输入主标题";const t2Val=document.getElementById('t2').value||"输入副标题";let mainT=canvas.getObjects().find(obj=>obj.id==='mainTitle');let subT=canvas.getObjects().find(obj=>obj.id==='subTitle');if(mainT&&subT){mainT.set({text:t1Val});subT.set({text:t2Val});canvas.renderAll()}else{render()}}async function render(){if(!canvas||isRendering)return;isRendering=true;canvas.clear();canvas.setBackgroundColor('#ffffff',canvas.renderAll.bind(canvas));const W=canvas.width,H=canvas.height,g=GAP/2;const regions=[{x:0,y:0,w:W/2-g,h:H/2-g},{x:W/2+g,y:0,w:W/2-g,h:H/2-g},{x:W/2+g,y:H/2+g,w:W/2-g,h:H/2-g},{x:0,y:H/2+g,w:W/2-g,h:H/2-g}];for(let i=0;i<Math.min(imgs.length,3);i++){await renderImage(imgs[i],regions[i])}const rT=regions[3];const padding=30;const maxW=rT.w-padding*2;const mainT=new fabric.Textbox(document.getElementById('t1').value||"输入主标题",{id:'mainTitle',left:rT.x+rT.w/2,top:rT.y+rT.h/2-20,width:maxW,fontSize:50,fontWeight:800,fill:'#1e293b',textAlign:'center',originX:'center',originY:'bottom',selectable:false,fontFamily:DEFAULT_FONT});const subT=new fabric.Textbox(document.getElementById('t2').value||"输入副标题",{id:'subTitle',left:rT.x+rT.w/2,top:rT.y+rT.h/2+10,width:maxW,fontSize:40,fill:'#1e293b',textAlign:'center',originX:'center',originY:'top',selectable:false,fontFamily:DEFAULT_FONT});const now=new Date();const timeStr=`更新于:${now.toLocaleString()}`;const timeT=new fabric.Text(timeStr,{left:rT.x+rT.w/2,top:rT.y+rT.h-15,fontSize:20,fill:'#94a3b8',originX:'center',originY:'bottom',selectable:false,fontFamily:DEFAULT_FONT});canvas.add(mainT,subT,timeT);canvas.renderAll();isRendering=false}function save(){const t1=document.getElementById('t1').value.trim();const t2=document.getElementById('t2').value.trim();if(!t1||!t2){showToast("⚠️ 两个标题为必填项");return}const url=canvas.toDataURL({format:'png',multiplier:2});const link=document.createElement('a');link.download=`${t1}-${t2}.png`;link.href=url;link.click()}</script><script>var _hmt=_hmt||[];(function(){var hm=document.createElement("script");hm.src="https://hm.baidu.com/hm.js?757929a3feb95c93fd7fb29b23896390";var s=document.getElementsByTagName("script")[0];s.parentNode.insertBefore(hm,s)})();</script></body></html>
